<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070b12" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Glowing effect for text -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    <![CDATA[
    /* CSS Styling and Animations for the Dynamic Aspect */
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; filter: drop-shadow(0 0 15px #f43f5e); }
      100% { opacity: 0.7; }
    }

    @keyframes scanline {
      0% { transform: translateY(-200px); }
      100% { transform: translateY(200px); }
    }

    @keyframes float {
      0% { transform: translate(0, 0px) rotate(0deg); }
      50% { transform: translate(10px, -10px) rotate(3deg); }
      100% { transform: translate(0, 0px) rotate(0deg); }
    }

    @keyframes glitch {
      0% { clip-path: inset(40% 0 61% 0); }
      20% { clip-path: inset(92% 0 1% 0); }
      40% { clip-path: inset(25% 0 58% 0); }
      60% { clip-path: inset(75% 0 5% 0); }
      80% { clip-path: inset(12% 0 85% 0); }
      100% { clip-path: inset(40% 0 61% 0); }
    }

    .bg {
      fill: url(#bg-grad);
    }

    .title {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 42px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    .accent-title {
      fill: #f43f5e;
      animation: pulse 3s infinite ease-in-out;
    }

    .subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #94a3b8;
      letter-spacing: 4px;
    }

    .grid-lines {
      stroke: #334155;
      stroke-width: 0.5;
      opacity: 0.3;
    }

    .scan {
      stroke: #f43f5e;
      stroke-width: 2;
      opacity: 0.15;
      animation: scanline 4s infinite linear;
    }

    .floating-particle {
      fill: #38bdf8;
      opacity: 0.6;
      animation: float 6s infinite ease-in-out;
    }
    ]]>
  </style>

  <!-- Background -->
  <rect width="800" height="200" class="bg" />

  <!-- Grid Representation of Latent Space -->
  <g class="grid-lines">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="120" x2="800" y2="120" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="100" y1="0" x2="100" y2="200" />
    <line x1="200" y1="0" x2="200" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="400" y1="0" x2="400" y2="200" />
    <line x1="500" y1="0" x2="500" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="700" y1="0" x2="700" y2="200" />
  </g>

  <!-- Animated Scanline -->
  <line x1="0" y1="0" x2="800" y2="0" class="scan" />

  <!-- Floating Vector Nodes -->
  <circle cx="120" cy="60" r="4" class="floating-particle" style="animation-delay: 0s;" />
  <circle cx="680" cy="140" r="3" class="floating-particle" style="animation-delay: 1.5s; fill: #f43f5e;" />
  <circle cx="720" cy="50" r="5" class="floating-particle" style="animation-delay: 3s; fill: #a855f7;" />
  <circle cx="80" cy="150" r="4" class="floating-particle" style="animation-delay: 4.5s;" />

  <!-- Title Text -->
  <g transform="translate(400, 95)" text-anchor="middle">
    <text class="title" filter="url(#glow)">
      AWESOME <tspan class="accent-title">ADVERSARIAL</tspan> ATTACKS
    </text>
  </g>

  <!-- Subtitle Text -->
  <g transform="translate(400, 135)" text-anchor="middle">
    <text class="subtitle">
      HISTORY • PROGRESSION • VARIANTS • APPLICATIONS
    </text>
  </g>

  <!-- Security Shield Icon -->
  <g transform="translate(37, 25) scale(0.7)" opacity="0.8">
    <path d="M18 2.01L2 9c0 9.19 5.84 15.63 16 19.06C28.16 24.63 34 18.19 34 9l-16-6.99z" fill="none" stroke="#f43f5e" stroke-width="2" />
    <path d="M18 4.1L4 10.2c0 7.78 4.95 13.23 14 16.14 9.05-2.91 14-8.36 14-16.14L18 4.1z" fill="#f43f5e" opacity="0.3" />
  </g>
</svg>
